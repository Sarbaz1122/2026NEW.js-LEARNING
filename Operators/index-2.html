
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ATM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="atm">

    <h1>🏧 Smart ATM</h1>

    <h2 id="balance">Balance: Rs. 5000</h2>

    <input
        type="number"
        id="amount"
        placeholder="Enter Amount"
    >

    <div class="buttons">

        <button id="depositBtn">
            Deposit
        </button>

        <button id="withdrawBtn">
            Withdraw
        </button>

        <button id="checkBtn">
            Check Balance
        </button>

        <button id="exitBtn">
            Exit
        </button>

    </div>

    <h3 id="message"></h3>

</div>

<script src="P-01 ATMCard.js"></script>

</body>
</html>
